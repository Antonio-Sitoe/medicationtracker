name: medicationtracker
description: 'A new Flutter project.'
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  introduction_screen: ^4.0.0
  shared_preferences: ^2.5.3
  go_router: ^17.2.3
  intl: ^0.20.2
  uuid: ^4.0.0
  image_picker: ^1.1.2
  share_plus: ^13.0.0
  provider: ^6.1.5
  path: ^1.9.1
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  crypto: ^3.0.5
  flutter_localization: ^0.4.0
  flutter_localizations:
    sdk: flutter
  shimmer: ^3.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.0+1
  flutter_timezone: ^5.0.2

dependency_overrides:
  path_provider_android: ">=2.2.0 <2.3.0"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/onboard/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_24pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700
